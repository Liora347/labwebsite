# Basic Site Settings
locale: "en-US"
title: "Eran Meshorer Lab"
title_separator: "-"
name: "Eran Meshorer Lab"
description: "The Meshorer lab studies epigenetic regulation, stem cell biology, neurodegeneration, and paleo-epigenetics."

url: "https://liora347.github.io"
baseurl: "/labwebsite"
repository: "liora347/labwebsite"

# Site Author
<div class="person-row person-with-image">
  <img src="/labwebsite/images/Eran.jpg">
  name: "Professor Eran Meshorer"
  bio: "Short biography for the left-hand sidebar"
  location: "The Hebrew University of Jerusalem"
  employer: "The Hebrew University of Jerusalem"
  email: "eran.meshorer@mail.huji.ac.il"

  googlescholar: "https://scholar.google.com/citations?user=PS_CX0AAAAAJ"
  orcid: "https://orcid.org/yourorcidurl"
  pubmed: "https://www.ncbi.nlm.nih.gov/pubmed/?term=meshorer"

  github: "academicpages"

# Site Settings
breadcrumbs: false
future: true
read_more: "disabled"

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true

# Markdown
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jemoji

# Include / Exclude
include:
  - _pages

exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Output
permalink: /:categories/:title/

timezone: Etc/UTC

theme: jekyll-theme-primer
