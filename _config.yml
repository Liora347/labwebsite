# ---------------------------
# SITE SETTINGS
# ---------------------------
locale: "en-US"
title: "Eran Meshorer Lab"
title_separator: "-"
name: "Eran Meshorer Lab"
description: "The Meshorer lab studies epigenetic regulation, stem cell biology, neurodegeneration, and paleo-epigenetics."

url: "https://liora347.github.io"
baseurl: "/labwebsite"
repository: "liora347/labwebsite"

# ---------------------------
# THEME (IMPORTANT)
# ---------------------------
remote_theme: "mmistakes/minimal-mistakes"

# ---------------------------
# AUTHOR (PI SIDEBAR)
# ---------------------------
author: Eran Meshorer
author_profile: true

# ---------------------------
# SITE BEHAVIOR
# ---------------------------
breadcrumbs: false
future: true
read_more: "disabled"

# ---------------------------
# COLLECTIONS
# ---------------------------
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# ---------------------------
# DEFAULTS (sidebar enabled)
# ---------------------------
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true

# ---------------------------
# MARKDOWN
# ---------------------------
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM

# ---------------------------
# PLUGINS (GitHub Pages safe)
# ---------------------------
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jemoji

# ---------------------------
# FILE HANDLING
# ---------------------------
include:
  - _pages

exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock

# ---------------------------
# STYLING
# ---------------------------
sass:
  sass_dir: _sass
  style: compressed

# ---------------------------
# URL STYLE
# ---------------------------
permalink: /:categories/:title/

timezone: Etc/UTC
