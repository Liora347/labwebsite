# Basic Site Settings
locale: "en-US"
title: "Eran Meshorer Lab"
title_separator: "-"
name: "Eran Meshorer Lab"
description: "The Meshorer lab studies epigenetic regulation, stem cell biology, neurodegeneration, and paleo-epigenetics."

url: "https://liora347.github.io"
baseurl: "/labwebsite"
repository: "liora347/labwebsite"

author: Eran Meshorer
author_profile: true
  avatar: "/labwebsite/images/Eran.jpg"
  name: "Professor Eran Meshorer"
  bio: "Short biography for the left-hand sidebar"
  location: "The Hebrew University of Jerusalem"
  email: "meshorer@huji.ac.il"
  phone: "Tel. +972-2-6585161 (office); +972-2-6585143/4 (lab). Fax: +972-2-6586073"
  links:
    - label: "Google Scholar"
      url: "https://scholar.google.com/citations?user=UOQDc0UAAAAJ&hl=en"
    - label: "ORCID"
      url: "https://orcid.org/0000-0003-4777-986X"

# Site Settings
breadcrumbs: false
future: true
read_more: "disabled"

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true

# Markdown
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jemoji

# Include / Exclude
include:
  - _pages

exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Output
permalink: /:categories/:title/

timezone: Etc/UTC

theme: jekyll-theme-primer
